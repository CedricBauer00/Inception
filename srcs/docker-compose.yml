
services:
  
  nginx:
    build: ./requirements/nginx
    container_name: nginx #container_name == image ???????
    # image: 'jc21/nginx-proxy-manager:latest'
    depends_on:
      - wordpress
    restart: unless-stopped
    ports:
      - '443:443'
    volumes:
      - ../secrets:/etc/letsencrypt
      - wp_data:/var/www/html
      #mounts cert and ket directly into the container
      # - ./data:/data 
      # for saving certificates?
    networks:
      - my_network

  #just blueprint for the mariadb
  mariadb:
    build: ./requirements/mariadb
    container_name:  mariadb
    restart: unless-stopped
    volumes:
      - db_data:/var/lib/mysql
    env_file:
      - .env
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD}
      - MYSQL_DATABASE=${DATABASE_NAME}
      - MYSQL_USER=${DB_USER}
      - MYSQL_PASSWORD=${DB_PASSWORD}
    networks:
      - my_network

  wordpress:
    build: ./requirements/wordpress/
    container_name: wordpress
    depends_on:
      - mariadb
    #brauche ich ein depends on?
    restart: unless-stopped
    volumes:
      - wp_data:/var/www/html
    env_file:
      - .env
    environment:
      - WORDPRESS_DB_HOST=mariadb
      - WORDPRESS_DB_NAME=${DATABASE_NAME}
      - WORDPRESS_DB_USER=${DB_USER}
      - WORDPRESS_DB_PASSWORD=${DB_PASSWORD}
      #- WORDPRESS_DB_NAME=wordpress
    networks:
      - my_network
  
# secrets:
  #path von secrets dir
    
volumes:
  db_data:
    driver: local #safe data locally/ cloud/network
    driver_opts:
      type: none
      o: bind #bind mount
      device: /home/cbauer/data/mariadb # absolut path on host
  
  wp_data:
    driver: local
    driver_opts:
      type: none # kein specific type 
      o: bind # wir binden einen folder
      device: /home/cbauer/data/wordpress # absolut path on host

networks:
  my_network:
    driver: bridge 
    # alle container in netzwerk bekommen eigene, interne IP adresse 
    # nach aussen teilen sie sich Host IP adresse -> private network 
    # haben feste ports & IP adressen - exception nginx - port forwarding


  # worpress_data:/var/www/html:ro./nginx/ssl:/etc/ssl/:ro ???? research!


